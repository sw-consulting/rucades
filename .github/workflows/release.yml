name: Release

on:
  pull_request_target:
    types:
      - closed
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: Semantic version bump to release
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: '${{ github.workflow }}-${{ github.event.pull_request.base.ref || github.ref_name }}'
  cancel-in-progress: false

jobs:
  release:
    outputs:
      version: ${{ steps.version.outputs.version }}
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       (contains(github.event.pull_request.labels.*.name, 'semantic:major') ||
       contains(github.event.pull_request.labels.*.name, 'semantic:minor') ||
       contains(github.event.pull_request.labels.*.name, 'semantic:patch') ||
       contains(github.event.pull_request.labels.*.name, 'semver:major') ||
       contains(github.event.pull_request.labels.*.name, 'semver:minor') ||
       contains(github.event.pull_request.labels.*.name, 'semver:patch')))
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve semantic version bump
        id: bump
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_BUMP: ${{ inputs.bump }}
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          set -euo pipefail

          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            bump="${DISPATCH_BUMP}"
          else
            bump=""
            IFS=',' read -ra labels <<< "${LABELS}"
            for label in "${labels[@]}"; do
              case "${label}" in
                semantic:major|semver:major) bump="major" ;;
                semantic:minor|semver:minor) bump="minor" ;;
                semantic:patch|semver:patch) bump="patch" ;;
              esac
            done
          fi

          if [ -z "${bump}" ]; then
            echo "No semantic version label found. Add one of: semantic:major, semantic:minor, semantic:patch, semver:major, semver:minor, semver:patch." >&2
            exit 1
          fi

          echo "bump=${bump}" >> "${GITHUB_OUTPUT}"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Update version.rb
        id: version
        env:
          BUMP: ${{ steps.bump.outputs.bump }}
        run: |
          set -euo pipefail

          new_version=$(ruby -Ilib -e '
            require "rucades/version"
            parts = Rucades::VERSION.split(".").map(&:to_i)
            case ENV.fetch("BUMP")
            when "major"
              parts[0] += 1
              parts[1] = 0
              parts[2] = 0
            when "minor"
              parts[1] += 1
              parts[2] = 0
            when "patch"
              parts[2] += 1
            else
              abort %(Unsupported bump: #{ENV.fetch("BUMP")})
            end
            puts parts.join(".")
          ')

          NEW_VERSION="${new_version}" ruby -0777 -i -pe 'gsub(/VERSION = "[^"]+"/, "VERSION = \"#{ENV.fetch("NEW_VERSION")}\"")' lib/rucades/version.rb

          echo "version=${new_version}" >> "${GITHUB_OUTPUT}"

      - name: Commit version update
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/rucades/version.rb
          git commit -m "Release v${VERSION}"
          git tag "v${VERSION}"

      - name: Build gem package without SDK
        run: |
          set -euo pipefail
          rm -rf pkg
          gem build rucades.gemspec
          mkdir -p pkg
          mv rucades-*.gem pkg/

          rm -rf tmp-gem-check
          gem unpack pkg/rucades-*.gem --target tmp-gem-check
          if find tmp-gem-check -path '*/sdk/*' -print -quit | grep -q .; then
            echo "SDK files must not be included in the packaged gem." >&2
            exit 1
          fi
          rm -rf tmp-gem-check

      - name: Publish to RubyGems.org
        env:
          RUBYGEMS_PUSH_TOKEN: ${{ secrets.RUBYGEMS_PUSH_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p ~/.gem
          printf ':sw-consulting: %s\n' "${RUBYGEMS_PUSH_TOKEN}" > ~/.gem/credentials
          chmod 0600 ~/.gem/credentials
          gem push --key sw-consulting pkg/rucades-*.gem

      - name: Push release commit and tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          git push origin main
          git push origin "v${VERSION}"

  test-published-gem:
    needs: release
    runs-on: ${{ matrix.os }}
    name: Test gem on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-22.04]

    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - name: Install packages (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt -y update
          sudo apt -y install cmake build-essential libboost-dev unzip wget

      - name: Install packages (macOS)
        if: runner.os == 'macOS'
        run: brew install boost cmake

      - name: Install CSP and SDK (Linux)
        if: runner.os == 'Linux'
        run: |
          pushd sdk
          tar xvf linux-amd64_deb.tgz
          pushd linux-amd64_deb
          sudo ./install.sh
          sudo apt install ./lsb-cprocsp-devel_5.0*.deb
          popd
          tar xvf cades-linux-amd64.tar.gz
          pushd cades-linux-amd64
          sudo apt install ./cprocsp-pki-cades*.deb
          popd
          popd

      - name: Install CSP and SDK (macOS)
        if: runner.os == 'macOS'
        run: |
          pushd sdk
          sudo installer -pkg macos-cprocsp.pkg -target /
          popd

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'

      - name: Wait for gem propagation and install
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          set -euo pipefail
          echo "Installing rucades v${VERSION} from RubyGems..."
          for i in $(seq 1 20); do
            if gem install rucades -v "${VERSION}" --no-document; then
              echo "Gem installed successfully on attempt ${i}"
              break
            fi
            if [ "${i}" -eq 20 ]; then
              echo "Failed to install gem after 20 attempts" >&2
              exit 1
            fi
            echo "Attempt ${i} failed, retrying in 30s..."
            sleep 30
          done

      - name: Verify gem loads and check version
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          ruby -e '
            require "rucades"
            sdk_version = Rucades::About.new.version.to_s
            puts "CADES SDK version: #{sdk_version}"
            gem_version = Gem.loaded_specs["rucades"]&.version&.to_s || ENV.fetch("VERSION")
            puts "rucades gem version: #{gem_version}"
          '
